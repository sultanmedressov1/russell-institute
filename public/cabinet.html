<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Personal Cabinet — The Russell Institute</title>
<link rel="icon" type="image/png" href="/logo1.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+SC:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Lora', Georgia, serif; background: #F9F7F2; color: #1A2B45; min-height: 100vh; }

  /* ── Header ── */
  .hdr { background: rgba(249,247,242,0.97); border-bottom: 1px solid #D8CEB8; padding: 0 40px; height: 72px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
  .logo-box { width: 34px; height: 34px; border: 1px solid #1A2B45; display: flex; align-items: center; justify-content: center; }
  .logo-title { font-family: 'Cormorant SC', serif; font-size: 0.74rem; letter-spacing: 0.2em; color: #1A2B45; }
  .logo-sub { font-family: 'Lora', serif; font-size: 0.52rem; letter-spacing: 0.12em; text-transform: uppercase; color: #9A8878; }
  .back-link { font-family: 'Cormorant SC', serif; font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: #5A6A7A; text-decoration: none; transition: color 0.2s; }
  .back-link:hover { color: #1A2B45; }
  .lang-toggle { display: flex; border: 1px solid rgba(26,43,69,0.3); overflow: hidden; }
  .lang-btn { font-family: 'Cormorant SC', serif; font-size: 0.6rem; letter-spacing: 0.18em; border: none; background: transparent; cursor: pointer; padding: 6px 11px; transition: all 0.22s; color: rgba(90,106,122,0.7); }
  .lang-btn.active { background: #1A2B45; color: #F9F7F2; }

  /* ── Main ── */
  .main { max-width: 760px; margin: 0 auto; padding: 80px 40px; }
  .slbl { font-family: 'Cormorant SC', serif; font-size: 0.62rem; letter-spacing: 0.32em; text-transform: uppercase; color: #4A0E0E; }

  /* ── Login form ── */
  .login-card { border: 1px solid #D8CEB8; background: #FFFEF9; padding: 52px 56px; }
  .field { margin-bottom: 24px; }
  .field label { display: block; font-family: 'Cormorant SC', serif; font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: #7A6A58; margin-bottom: 8px; }
  .field input { width: 100%; background: #F9F7F2; border: 1px solid #D8CEB8; padding: 14px 18px; font-family: 'Lora', serif; font-size: 0.88rem; color: #1A2B45; outline: none; transition: border-color 0.25s; }
  .field input:focus { border-color: #1A2B45; }
  .field input.err { border-color: #8B2020; }
  .err-msg { font-family: 'Lora', serif; font-size: 0.72rem; color: #8B2020; margin-top: 8px; font-style: italic; }
  .btn-primary { width: 100%; background: #1A2B45; color: #F9F7F2; font-family: 'Cormorant SC', serif; font-size: 0.72rem; letter-spacing: 0.28em; text-transform: uppercase; border: none; padding: 18px 24px; cursor: pointer; transition: background 0.3s; margin-top: 8px; }
  .btn-primary:hover { background: #4A0E0E; }
  .btn-primary:disabled { background: #C8C0B0; cursor: not-allowed; }

  /* ── Dashboard ── */
  .welcome { margin-bottom: 48px; }
  .welcome h1 { font-family: 'EB Garamond', serif; font-size: 2.6rem; font-weight: 400; line-height: 1.12; margin-bottom: 12px; }
  .welcome p { font-size: 0.9rem; color: #5A6A7A; line-height: 1.8; }

  .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2px; margin-bottom: 40px; }
  .subject-card { background: #FFFEF9; border: 1px solid #D8CEB8; padding: 28px 32px; }
  .subject-name { font-family: 'EB Garamond', serif; font-size: 1.5rem; color: #1A2B45; margin-bottom: 16px; }
  .subject-meta { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .meta-row { display: flex; gap: 10px; align-items: center; font-size: 0.8rem; color: #3A4A5A; }
  .meta-key { font-family: 'Cormorant SC', serif; font-size: 0.56rem; letter-spacing: 0.18em; text-transform: uppercase; color: #9A8878; min-width: 52px; }

  .status-badge { display: inline-block; padding: 6px 14px; font-family: 'Cormorant SC', serif; font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; }
  .status-waiting { background: #EEE8E0; color: #7A6A58; border: 1px solid #D8CEB8; }
  .status-active  { background: #1A2B45; color: #F9F7F2; border: none; cursor: pointer; transition: background 0.3s; }
  .status-active:hover { background: #4A0E0E; }
  .status-done    { background: #EEF6EE; color: #2A5A2A; border: 1px solid #A8C8A8; }

  .info-box { border: 1px solid #D8CEB8; background: #FFFEF9; padding: 24px 32px; font-size: 0.82rem; color: #5A6A7A; line-height: 1.75; }
  .info-box strong { color: #1A2B45; font-weight: 600; }

  .logout-btn { font-family: 'Cormorant SC', serif; font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; background: transparent; border: 1px solid #D8CEB8; padding: 10px 22px; color: #5A6A7A; cursor: pointer; transition: all 0.25s; margin-top: 40px; }
  .logout-btn:hover { border-color: #4A0E0E; color: #4A0E0E; }

  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #D8CEB8; border-top-color: #1A2B45; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media(max-width:600px) { .main { padding: 48px 20px; } .login-card { padding: 32px 24px; } }
</style>
</head>
<body>

<header class="hdr">
  <a href="/" class="logo">
    <div class="logo-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#1A2B45" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    </div>
    <div>
      <div class="logo-title">The Russell Institute</div>
      <div class="logo-sub">Academic Excellence · Independent Research</div>
    </div>
  </a>
  <div style="display:flex;align-items:center;gap:20px">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn"        id="btn-ru" onclick="setLang('ru')">RU</button>
    </div>
    <a href="/" class="back-link" id="back-lnk">← Main site</a>
  </div>
</header>

<main class="main" id="main-area">
  <!-- content injected by JS -->
</main>

<script>
/* ══ CONFIG ══════════════════════════════════════════════════════════════════
   Replace SCRIPT_URL with your deployed Apps Script URL                    */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzgeCUChzdk3qNraq6BlBPFoeiQn2VUe_tlhW5Rvmlah0gUBgml31soRyHsv8Cch29t/exec";

/* ══ Olympiad schedule (must match App.jsx) ══════════════════════════════ */
const SCHEDULE = {
  "Mathematics":     { dateEn: "10 May 2026", dateRu: "10 мая 2026",  time: "10:00",  durationMin: 90, isoStart: "2026-05-10T10:00:00+06:00" },
  "Physics":         { dateEn: "10 May 2026", dateRu: "10 мая 2026",  time: "12:00",  durationMin: 90, isoStart: "2026-05-10T12:00:00+06:00" },
  "Computer Science":{ dateEn: "11 May 2026", dateRu: "11 мая 2026",  time: "10:00",  durationMin: 90, isoStart: "2026-05-11T10:00:00+06:00" },
  "Biology":         { dateEn: "11 May 2026", dateRu: "11 мая 2026",  time: "12:00",  durationMin: 90, isoStart: "2026-05-11T12:00:00+06:00" },
  "Economics":       { dateEn: "12 May 2026", dateRu: "12 мая 2026",  time: "10:00",  durationMin: 90, isoStart: "2026-05-12T10:00:00+06:00" },
  "Business":        { dateEn: "12 May 2026", dateRu: "12 мая 2026",  time: "12:00",  durationMin: 90, isoStart: "2026-05-12T12:00:00+06:00" },
};

/* ══ i18n strings ════════════════════════════════════════════════════════ */
const TR = {
  pageTitle:    { en: "Personal Cabinet", ru: "Личный кабинет" },
  backLink:     { en: "← Main site",      ru: "← На сайт" },
  loginHeadline:{ en: "Sign in to your Cabinet", ru: "Войти в личный кабинет" },
  loginSub:     { en: "Enter the login and password you received after registration.", ru: "Введите логин и пароль, полученные после регистрации." },
  loginLabel:   { en: "Login",    ru: "Логин" },
  passLabel:    { en: "Password", ru: "Пароль" },
  loginBtn:     { en: "Sign In",  ru: "Войти" },
  errEmpty:     { en: "Please fill in both fields.", ru: "Заполните оба поля." },
  errInvalid:   { en: "Incorrect login or password.", ru: "Неверный логин или пароль." },
  errNetwork:   { en: "Network error. Please try again.", ru: "Ошибка сети. Попробуйте ещё раз." },
  welcome:      { en: "Welcome,",  ru: "Добро пожаловать," },
  yourSubjects: { en: "Your Registered Subjects", ru: "Ваши зарегистрированные предметы" },
  dateLabel:    { en: "Date",   ru: "Дата" },
  timeLabel:    { en: "Time",   ru: "Время" },
  statusWait:   { en: "Not started yet", ru: "Олимпиада ещё не началась" },
  statusStart:  { en: "Start Test",      ru: "Начать тест" },
  statusDone:   { en: "Completed",       ru: "Завершено" },
  infoTitle:    { en: "Important Information", ru: "Важная информация" },
  infoBody:     { en: "<strong>Start Test</strong> button becomes active only on the day and time of your olympiad.<br>Once started, the test must be completed in one sitting — do not close the browser or switch tabs.", ru: "Кнопка <strong>Начать тест</strong> становится активной только в день и время проведения олимпиады.<br>После начала тест необходимо пройти за один раз — не закрывайте браузер и не переключайте вкладки." },
  logout:       { en: "Sign out", ru: "Выйти" },
  subjectNames: {
    en: { Mathematics:"Mathematics", Physics:"Physics", "Computer Science":"Computer Science", Biology:"Biology", Economics:"Economics", Business:"Business" },
    ru: { Mathematics:"Математика",  Physics:"Физика",  "Computer Science":"Информатика",    Biology:"Биология", Economics:"Экономика", Business:"Бизнес"  },
  },
};

let lang = "en";
let userData = null;

function tr(key) { return TR[key][lang] || TR[key].en; }

function setLang(l) {
  lang = l;
  document.getElementById("btn-en").classList.toggle("active", l === "en");
  document.getElementById("btn-ru").classList.toggle("active", l === "ru");
  document.getElementById("back-lnk").textContent = tr("backLink");
  document.title = tr("pageTitle") + " — The Russell Institute";
  if (userData) renderDashboard();
  else renderLogin();
}

/* ══ Render ══════════════════════════════════════════════════════════════ */
function renderLogin(errMsg) {
  document.getElementById("main-area").innerHTML = `
    <div style="max-width:480px">
      <div class="slbl" style="margin-bottom:20px">${tr("pageTitle")}</div>
      <h1 style="font-family:'EB Garamond',serif;font-size:2.4rem;font-weight:400;line-height:1.12;margin-bottom:16px">${tr("loginHeadline")}</h1>
      <p style="font-size:0.88rem;color:#5A6A7A;line-height:1.8;margin-bottom:40px">${tr("loginSub")}</p>

      <div class="login-card">
        <div class="field">
          <label>${tr("loginLabel")}</label>
          <input type="text" id="inp-login" placeholder="OL-2026-XXXXX" ${errMsg ? 'class="err"' : ''} />
        </div>
        <div class="field">
          <label>${tr("passLabel")}</label>
          <input type="password" id="inp-pass" placeholder="••••••" ${errMsg ? 'class="err"' : ''} />
        </div>
        ${errMsg ? `<div class="err-msg">${errMsg}</div>` : ""}
        <button class="btn-primary" id="login-btn" onclick="doLogin()">${tr("loginBtn")}</button>
      </div>
    </div>`;

  document.getElementById("inp-pass").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });
}

function renderDashboard() {
  const subjects = userData.categories.split(";").map(s => s.trim()).filter(Boolean);
  const now = Date.now();

  const cards = subjects.map(subj => {
    const sch = SCHEDULE[subj];
    if (!sch) return "";
    const start = new Date(sch.isoStart).getTime();
    const end   = start + sch.durationMin * 60 * 1000;
    const nameDisp = TR.subjectNames[lang][subj] || subj;
    const dateDisp = lang === "en" ? sch.dateEn : sch.dateRu;

    let statusHtml;
    if (now >= start && now <= end) {
      statusHtml = `<button class="status-badge status-active" onclick="goTest('${subj}')">${tr("statusStart")}</button>`;
    } else if (now > end) {
      statusHtml = `<span class="status-badge status-done">${tr("statusDone")}</span>`;
    } else {
      statusHtml = `<span class="status-badge status-waiting">${tr("statusWait")}</span>`;
    }

    return `
      <div class="subject-card">
        <div class="subject-name">${nameDisp}</div>
        <div class="subject-meta">
          <div class="meta-row"><span class="meta-key">${tr("dateLabel")}</span>${dateDisp}</div>
          <div class="meta-row"><span class="meta-key">${tr("timeLabel")}</span>${sch.time}</div>
        </div>
        ${statusHtml}
      </div>`;
  }).join("");

  document.getElementById("main-area").innerHTML = `
    <div class="welcome">
      <div class="slbl" style="margin-bottom:16px">${tr("pageTitle")}</div>
      <h1>${tr("welcome")} ${userData.name}</h1>
    </div>

    <div class="slbl" style="margin-bottom:20px">${tr("yourSubjects")}</div>
    <div class="subject-grid">${cards}</div>

    <div class="info-box" style="margin-bottom:32px">
      <div style="font-family:'Cormorant SC',serif;font-size:0.6rem;letter-spacing:0.22em;text-transform:uppercase;color:#4A0E0E;margin-bottom:12px">${tr("infoTitle")}</div>
      ${tr("infoBody")}
    </div>

    <button class="logout-btn" onclick="doLogout()">${tr("logout")}</button>`;
}

/* ══ Auth logic ══════════════════════════════════════════════════════════ */
async function doLogin() {
  const login = (document.getElementById("inp-login").value || "").trim();
  const pass  = (document.getElementById("inp-pass").value  || "").trim();

  if (!login || !pass) { renderLogin(tr("errEmpty")); return; }

  const btn = document.getElementById("login-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const url = SCRIPT_URL + "?action=login&login=" + encodeURIComponent(login) + "&password=" + encodeURIComponent(pass);
    const res  = await fetch(url);
    const data = await res.json();

    if (data.status === "ok") {
      userData = data;
      sessionStorage.setItem("ri_user", JSON.stringify(data));
      renderDashboard();
    } else {
      renderLogin(tr("errInvalid"));
    }
  } catch (err) {
    renderLogin(tr("errNetwork"));
  }
}

function doLogout() {
  userData = null;
  sessionStorage.removeItem("ri_user");
  renderLogin();
}

function goTest(subject) {
  sessionStorage.setItem("ri_subject", subject);
  window.open("/test.html", "_blank");
}

/* ══ Boot ════════════════════════════════════════════════════════════════ */
(function init() {
  const saved = sessionStorage.getItem("ri_user");
  if (saved) {
    try { userData = JSON.parse(saved); } catch(e) {}
  }
  document.title = tr("pageTitle") + " — The Russell Institute";
  document.getElementById("back-lnk").textContent = tr("backLink");
  if (userData) renderDashboard();
  else renderLogin();
})();
</script>
</body>
</html>
