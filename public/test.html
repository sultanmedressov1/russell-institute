<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Olympiad Test — The Russell Institute</title>
<link rel="icon" type="image/png" href="/logo1.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+SC:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lora', Georgia, serif;
    background: #1A2B45;
    color: #EEE8E0;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }

  /* ── Top bar ── */
  .topbar {
    background: rgba(10,18,28,0.7);
    border-bottom: 1px solid rgba(200,216,240,0.08);
    padding: 0 40px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }
  .top-brand { font-family: 'Cormorant SC', serif; font-size: 0.72rem; letter-spacing: 0.22em; color: #C8D8E8; }
  .top-subject { font-family: 'EB Garamond', serif; font-size: 1.1rem; color: #C8A87A; }
  .timer-wrap { display: flex; align-items: center; gap: 10px; }
  .timer-label { font-family: 'Cormorant SC', serif; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: #7A9AB8; }
  .timer { font-family: 'EB Garamond', serif; font-size: 1.8rem; color: #EEE8E0; letter-spacing: 0.08em; min-width: 80px; text-align: right; }
  .timer.urgent { color: #C84040; }

  /* ── Main content ── */
  .content { max-width: 820px; margin: 0 auto; padding: 104px 40px 80px; }

  .test-header { margin-bottom: 52px; }
  .slbl { font-family: 'Cormorant SC', serif; font-size: 0.62rem; letter-spacing: 0.32em; text-transform: uppercase; color: #4A0E0E; }
  .q-counter { font-family: 'Lora', serif; font-size: 0.82rem; color: #7A9AB8; margin-top: 8px; }

  /* ── Question card ── */
  .q-card { background: rgba(255,254,249,0.04); border: 1px solid rgba(200,216,240,0.12); padding: 40px 44px; margin-bottom: 32px; }
  .q-text { font-family: 'EB Garamond', serif; font-size: 1.28rem; font-weight: 400; line-height: 1.65; color: #EEE8E0; margin-bottom: 32px; }

  /* ── Answer options ── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 20px;
    border: 1px solid rgba(200,216,240,0.14);
    background: rgba(255,254,249,0.03);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .option:hover { border-color: rgba(200,216,240,0.35); background: rgba(255,254,249,0.06); }
  .option.selected { border-color: #C8A87A; background: rgba(200,168,122,0.1); }
  .opt-circle {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid rgba(200,216,240,0.3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .option.selected .opt-circle { border-color: #C8A87A; background: #C8A87A; }
  .opt-dot { width: 8px; height: 8px; border-radius: 50%; background: #1A2B45; display: none; }
  .option.selected .opt-dot { display: block; }
  .opt-text { font-family: 'Lora', serif; font-size: 0.9rem; color: #C8D8E8; line-height: 1.5; }

  /* ── Navigation ── */
  .nav-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; }
  .btn-nav {
    font-family: 'Cormorant SC', serif; font-size: 0.68rem; letter-spacing: 0.22em;
    text-transform: uppercase; border: 1px solid rgba(200,216,240,0.25);
    background: transparent; color: #C8D8E8; padding: 13px 36px; cursor: pointer;
    transition: all 0.25s;
  }
  .btn-nav:hover:not(:disabled) { border-color: #C8D8E8; }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-submit {
    font-family: 'Cormorant SC', serif; font-size: 0.68rem; letter-spacing: 0.22em;
    text-transform: uppercase; border: none;
    background: #C8A87A; color: #1A2B45; padding: 14px 44px; cursor: pointer;
    transition: all 0.25s;
  }
  .btn-submit:hover { background: #EEE8E0; }

  /* ── Progress bar ── */
  .progress-bar { height: 3px; background: rgba(200,216,240,0.1); margin-bottom: 32px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #4A0E0E, #C8A87A); transition: width 0.4s; }

  /* ── Warning overlay ── */
  .overlay {
    display: none;
    position: fixed; inset: 0; z-index: 500;
    background: rgba(10,18,28,0.88);
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .overlay.show { display: flex; }
  .warn-box {
    background: #F9F7F2; color: #1A2B45;
    max-width: 480px; width: 100%; padding: 48px;
    border: 2px solid #8B2020;
    animation: slideUp 0.28s cubic-bezier(0.22,1,0.36,1);
    text-align: center;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
  .warn-icon { font-size: 2.4rem; margin-bottom: 16px; }
  .warn-title { font-family: 'EB Garamond', serif; font-size: 1.8rem; margin-bottom: 12px; color: #8B2020; }
  .warn-body { font-family: 'Lora', serif; font-size: 0.88rem; line-height: 1.75; color: #3A4A5A; margin-bottom: 28px; }
  .warn-count { font-family: 'Cormorant SC', serif; font-size: 0.7rem; letter-spacing: 0.2em; color: #8B2020; margin-bottom: 28px; }
  .btn-warn { font-family: 'Cormorant SC', serif; font-size: 0.7rem; letter-spacing: 0.24em; text-transform: uppercase; background: #1A2B45; color: #F9F7F2; border: none; padding: 15px 40px; cursor: pointer; }
  .btn-warn:hover { background: #4A0E0E; }

  /* ── Submitted screen ── */
  .submitted-screen {
    display: none;
    position: fixed; inset: 0; z-index: 600;
    background: #1A2B45;
    align-items: center; justify-content: center;
    text-align: center; padding: 40px;
  }
  .submitted-screen.show { display: flex; flex-direction: column; }
  .sub-icon { font-size: 3rem; margin-bottom: 24px; }
  .sub-title { font-family: 'EB Garamond', serif; font-size: 2.8rem; font-weight: 400; color: #C8A87A; margin-bottom: 20px; }
  .sub-body { font-family: 'Lora', serif; font-size: 1rem; color: #8AAABE; line-height: 1.8; max-width: 520px; }

  @media(max-width:600px) { .topbar { padding: 0 16px; } .content { padding: 96px 16px 60px; } .q-card { padding: 24px 20px; } }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div>
    <div class="top-brand">THE RUSSELL INSTITUTE</div>
    <div class="top-subject" id="top-subject">Olympiad</div>
  </div>
  <div class="timer-wrap">
    <span class="timer-label" id="timer-label">Time remaining</span>
    <span class="timer" id="timer-display">90:00</span>
  </div>
</div>

<!-- Main test content -->
<div class="content" id="test-content">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="test-header">
    <div class="slbl" id="section-label">Section</div>
    <div class="q-counter" id="q-counter">Question 1 of 10</div>
  </div>
  <div class="q-card" id="question-card">
    <!-- injected by JS -->
  </div>
  <div class="nav-row">
    <button class="btn-nav" id="btn-prev" onclick="prevQ()">Previous</button>
    <button class="btn-nav" id="btn-next" onclick="nextQ()">Next</button>
    <button class="btn-submit" id="btn-submit" onclick="confirmSubmit()" style="display:none">Submit</button>
  </div>
</div>

<!-- Warning overlay -->
<div class="overlay" id="warn-overlay">
  <div class="warn-box">
    <div class="warn-icon">⚠️</div>
    <div class="warn-title" id="warn-title">Warning</div>
    <div class="warn-body" id="warn-body">You have switched tabs or minimised the window.</div>
    <div class="warn-count" id="warn-count">Violation 1 of 2. A third violation will auto-submit your paper.</div>
    <button class="btn-warn" onclick="closeWarn()">Return to Test</button>
  </div>
</div>

<!-- Submitted screen -->
<div class="submitted-screen" id="submitted-screen">
  <div class="sub-icon">📝</div>
  <div class="sub-title" id="sub-title">Paper Submitted</div>
  <div class="sub-body" id="sub-body">Your answers have been recorded. You may close this window.</div>
</div>

<script>
/* ══ CONFIG ══════════════════════════════════════════════════════════════ */
const DURATION_MINUTES = 90;   // ← change test duration here

/* ── Placeholder questions (replace with real ones) ──────────────────── */
const QUESTIONS = {
  default: [
    { text: "This is a placeholder question 1. Choose the best answer.", options: ["Option A", "Option B", "Option C", "Option D"] },
    { text: "This is a placeholder question 2. Choose the best answer.", options: ["Option A", "Option B", "Option C", "Option D"] },
    { text: "This is a placeholder question 3. Choose the best answer.", options: ["Option A", "Option B", "Option C", "Option D"] },
    { text: "This is a placeholder question 4. Choose the best answer.", options: ["Option A", "Option B", "Option C", "Option D"] },
    { text: "This is a placeholder question 5. Choose the best answer.", options: ["Option A", "Option B", "Option C", "Option D"] },
  ],
  Mathematics: [
    { text: "If f(x) = x² + 3x − 4, what are the roots of f(x) = 0?", options: ["x = 1 and x = −4", "x = −1 and x = 4", "x = 2 and x = −2", "x = 4 and x = −4"] },
    { text: "What is the derivative of sin(x) · cos(x)?", options: ["cos(2x)", "sin(2x)", "−sin²(x) + cos²(x)", "Both A and C"] },
    { text: "A geometric sequence has first term 3 and common ratio 2. What is the 6th term?", options: ["48", "96", "64", "192"] },
    { text: "Evaluate ∫₀¹ x² dx.", options: ["1/3", "1/2", "2/3", "1/4"] },
    { text: "How many solutions does the equation |2x − 5| = 3 have?", options: ["0", "1", "2", "Infinitely many"] },
  ],
  Physics: [
    { text: "A ball is thrown vertically upward with initial velocity 20 m/s. What is the maximum height reached? (g = 10 m/s²)", options: ["10 m", "20 m", "40 m", "80 m"] },
    { text: "Two charges +2μC and −2μC are placed 1 m apart. The force between them is:", options: ["Attractive", "Repulsive", "Zero", "Cannot be determined"] },
    { text: "A wave has frequency 440 Hz and wavelength 0.75 m. What is its speed?", options: ["330 m/s", "440 m/s", "293 m/s", "586 m/s"] },
    { text: "Which quantity is conserved in an elastic collision?", options: ["Kinetic energy only", "Momentum only", "Both kinetic energy and momentum", "Neither"] },
    { text: "The resistance of a wire doubles when:", options: ["Its length doubles", "Its area doubles", "Its temperature halves", "Its voltage doubles"] },
  ],
};

/* ══ State ═══════════════════════════════════════════════════════════════ */
const subject    = sessionStorage.getItem("ri_subject") || "default";
const questions  = QUESTIONS[subject] || QUESTIONS.default;
const answers    = new Array(questions.length).fill(null);
let   currentQ   = 0;
let   violations = 0;
let   submitted  = false;
let   timerSecs  = DURATION_MINUTES * 60;
let   timerInterval;

/* ══ i18n ════════════════════════════════════════════════════════════════ */
const lang = (() => {
  try { return JSON.parse(sessionStorage.getItem("ri_user") || "{}").lang || "en"; } catch(e) { return "en"; }
})();

const TT = {
  timerLabel: { en: "Time remaining", ru: "Осталось времени" },
  qOf:        { en: "Question",       ru: "Вопрос" },
  of:         { en: "of",             ru: "из" },
  prev:       { en: "Previous",       ru: "Назад" },
  next:       { en: "Next",           ru: "Далее" },
  submit:     { en: "Submit",         ru: "Сдать работу" },
  section:    { en: "Olympiad",       ru: "Олимпиада" },
  warnTitle:  { en: "Warning", ru: "Предупреждение" },
  warnBody1:  { en: "You have switched tabs or minimised the window. Please stay on this page.", ru: "Вы переключили вкладку или свернули окно. Оставайтесь на этой странице." },
  warnBodyF:  { en: "Final warning. The next tab switch will auto-submit your paper.", ru: "Последнее предупреждение. Следующее переключение вкладки автоматически сдаст вашу работу." },
  violation:  { en: "Violation", ru: "Нарушение" },
  of2:        { en: "of 2. A third violation will auto-submit.", ru: "из 2. Третье нарушение автоматически сдаст работу." },
  returnBtn:  { en: "Return to Test", ru: "Вернуться к тесту" },
  subTitle:   { en: "Paper Submitted", ru: "Работа сдана" },
  subBody:    { en: "Your answers have been recorded. Thank you for participating in the Russell Institute Olympiad. You may close this window.", ru: "Ваши ответы записаны. Благодарим за участие в олимпиаде Russell Institute. Вы можете закрыть это окно." },
};

function tt(k) { return TT[k][lang] || TT[k].en; }

/* ══ Render question ═════════════════════════════════════════════════════ */
function renderQ() {
  const q    = questions[currentQ];
  const pct  = ((currentQ + 1) / questions.length * 100).toFixed(1);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("q-counter").textContent =
    tt("qOf") + " " + (currentQ + 1) + " " + tt("of") + " " + questions.length;

  const optHtml = q.options.map((opt, i) => `
    <div class="option${answers[currentQ] === i ? " selected" : ""}" onclick="selectOpt(${i})">
      <div class="opt-circle"><div class="opt-dot"></div></div>
      <span class="opt-text">${opt}</span>
    </div>`).join("");

  document.getElementById("question-card").innerHTML =
    `<div class="q-text">${q.text}</div><div class="options">${optHtml}</div>`;

  document.getElementById("btn-prev").disabled = (currentQ === 0);
  const isLast = currentQ === questions.length - 1;
  document.getElementById("btn-next").style.display  = isLast ? "none" : "inline-block";
  document.getElementById("btn-submit").style.display = isLast ? "inline-block" : "none";
}

function selectOpt(i) {
  if (submitted) return;
  answers[currentQ] = i;
  renderQ();
}

function prevQ() { if (currentQ > 0) { currentQ--; renderQ(); } }
function nextQ() { if (currentQ < questions.length - 1) { currentQ++; renderQ(); } }

/* ══ Timer ═══════════════════════════════════════════════════════════════ */
function startTimer() {
  timerInterval = setInterval(() => {
    timerSecs--;
    const m = Math.floor(timerSecs / 60);
    const s = timerSecs % 60;
    const display = document.getElementById("timer-display");
    display.textContent = m + ":" + String(s).padStart(2, "0");
    if (timerSecs <= 300) display.classList.add("urgent");
    if (timerSecs <= 0)   doSubmit("timeout");
  }, 1000);
}

/* ══ Submit ══════════════════════════════════════════════════════════════ */
function confirmSubmit() { doSubmit("manual"); }

function doSubmit(reason) {
  if (submitted) return;
  submitted = true;
  clearInterval(timerInterval);

  document.getElementById("submitted-screen").classList.add("show");
  document.getElementById("sub-title").textContent = tt("subTitle");
  document.getElementById("sub-body").textContent  = tt("subBody");

  if (document.fullscreenElement) {
    document.exitFullscreen().catch(() => {});
  }
}

/* ══ Visibility / tab-switch monitoring ═════════════════════════════════ */
document.addEventListener("visibilitychange", () => {
  if (submitted || document.visibilityState !== "hidden") return;
  violations++;
  showWarn();
  if (violations >= 3) {
    setTimeout(() => doSubmit("violation"), 800);
  }
});

function showWarn() {
  if (submitted) return;
  const overlay = document.getElementById("warn-overlay");
  document.getElementById("warn-title").textContent = tt("warnTitle");
  document.getElementById("warn-body").textContent  = violations >= 2 ? tt("warnBodyF") : tt("warnBody1");
  document.getElementById("warn-count").textContent =
    tt("violation") + " " + violations + " " + tt("of2");
  overlay.classList.add("show");
}

function closeWarn() {
  document.getElementById("warn-overlay").classList.remove("show");
}

/* ══ Anti-cheat ══════════════════════════════════════════════════════════ */
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("copy",        e => e.preventDefault());
document.addEventListener("keydown",     e => {
  // block F12, Ctrl+Shift+I, Ctrl+U, Ctrl+S, Ctrl+P
  if (e.key === "F12") { e.preventDefault(); return; }
  if (e.ctrlKey && ["u","U","s","S","p","P"].includes(e.key)) { e.preventDefault(); }
  if (e.ctrlKey && e.shiftKey && ["i","I","j","J","c","C"].includes(e.key)) { e.preventDefault(); }
});

/* ══ Fullscreen ══════════════════════════════════════════════════════════ */
function enterFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen)         el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
}

/* ══ Boot ════════════════════════════════════════════════════════════════ */
(function init() {
  // localise static labels
  document.getElementById("timer-label").textContent = tt("timerLabel");
  document.getElementById("btn-prev").textContent    = tt("prev");
  document.getElementById("btn-next").textContent    = tt("next");
  document.getElementById("btn-submit").textContent  = tt("submit");
  document.getElementById("section-label").textContent = tt("section");
  document.getElementById("btn-warn").textContent    = tt("returnBtn");

  // subject label in topbar
  const subjectNames = { en:{ Mathematics:"Mathematics", Physics:"Physics", "Computer Science":"Computer Science", Biology:"Biology", Economics:"Economics", Business:"Business" }, ru:{ Mathematics:"Математика", Physics:"Физика", "Computer Science":"Информатика", Biology:"Биология", Economics:"Экономика", Business:"Бизнес" } };
  document.getElementById("top-subject").textContent =
    (subjectNames[lang] || subjectNames.en)[subject] || subject;

  enterFullscreen();
  renderQ();
  startTimer();
})();
</script>
</body>
</html>
