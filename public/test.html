<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Олимпиада по математике — The Russell Institute</title>
<link rel="icon" type="image/png" href="/logo1.png" />
<style>

    color: #5A6A7A; font-family: 'Cormorant SC', serif; font-size: 0.65rem;

  .dot.current  { background: #C8A87A; color: #1A2B45; border-color: #C8A87A; }
  .q-card {

    border: 1px solid rgba(200,168,122,0.14);
    padding: 40px 44px; margin: 0 0 28px;
  }
  .q-tag {
    font-family: 'Cormorant SC', serif; font-size: 0.56rem;

    font-family: 'EB Garamond', serif; font-size: 1.22rem;
    line-height: 1.72; color: #EEE8E0; margin-bottom: 24px;

  .q-hint { font-family: 'Lora', serif; font-size: 0.74rem; color: #4A6A7A; font-style: italic; margin-bottom: 12px; }

  .btn-nav {

    text-transform: uppercase; border: 1px solid rgba(200,216,240,0.18);

  .warn-title { font-family: 'EB Garamond', serif; font-size: 1.8rem; color: #8B2020; margin-bottom: 10px; }
  .warn-body  { font-family: 'Lora', serif; font-size: 0.84rem; line-height: 1.75; color: #3A4A5A; margin-bottom: 10px; }

    font-family: 'Cormorant SC', serif; font-size: 0.7rem; letter-spacing: 0.22em;
    text-transform: uppercase; background: #1A2B45; color: #F9F7F2;
    border: none; padding: 14px 40px; cursor: pointer; transition: background 0.25s;
  }
  .btn-warn:hover { background: #4A0E0E; }

  .submitted-screen {
    display: none; position: fixed; inset: 0; z-index: 600;
    background: #0E1620; align-items: center; justify-content: center;
    text-align: center; padding: 40px; flex-direction: column;
  }

  .sub-icon  { font-size: 3rem; margin-bottom: 28px; }
  .sub-title { font-family: 'EB Garamond', serif; font-size: 2.8rem; color: #C8A87A; margin-bottom: 20px; }

    .topbar{padding:0 16px;} .content{padding:88px 16px 60px;}

  }
</style>
</head>
<body>

<div class="topbar">
  <div class="top-left">
    <div class="top-brand">THE RUSSELL INSTITUTE</div>
    <div class="top-subject">Математика — 10 класс</div>
  </div>
  <div class="timer-wrap">
    <span class="timer-label">Осталось</span>
    <span class="timer" id="timer-display">90:00</span>
  </div>
</div>

<div class="content">

  <div class="nav-row">

  </div>
</div>

    <div class="warn-count" id="warn-count"></div>

  </div>
</div>

<div class="submitted-screen" id="submitted-screen">

  <div class="sub-note" id="sub-note">Сохранение ответов...</div>
</div>

  {
    tag: "Открытый вопрос",
    text: "Представьте, что вы объясняете своему младшему брату или сестре (6 класс), что такое функция. Как бы вы объяснили это понятие простыми словами, без формул? Используйте жизненный пример.",
    type: "textarea",
    placeholder: "Напишите объяснение простым языком с примером..."
  },
];

/* ══ State ══════════════════════════════════════════════════════ */
const answers  = new Array(QUESTIONS.length).fill("");
let currentQ   = 0;
let violations = 0;
let submitted  = false;
let timerSecs  = DURATION_MINUTES * 60;
let timerInterval;

const userRaw = sessionStorage.getItem("ri_user");
const user    = userRaw ? (function(){ try{ return JSON.parse(userRaw); }catch(e){ return {}; } })() : {};

/* ══ Render ══════════════════════════════════════════════════════ */
function renderQ() {
  const q   = QUESTIONS[currentQ];
  const pct = ((currentQ + 1) / QUESTIONS.length * 100).toFixed(1);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("q-counter").textContent =
    "Вопрос " + (currentQ + 1) + " из " + QUESTIONS.length;

  /* Dots */
  var html = "";
  for (var i = 0; i < QUESTIONS.length; i++) {
    var cls = "dot";
    if (i === currentQ) cls += " current";
    else if (answers[i] && answers[i].trim()) cls += " answered";
    html += '<button class="' + cls + '" onclick="goToQ(' + i + ')">' + (i+1) + '</button>';
  }
  document.getElementById("dots-row").innerHTML = html;

  /* Field */
  var fieldHtml;
  if (q.type === "textarea") {
    fieldHtml =
      '<div class="q-hint">Развёрнутый ответ:</div>' +
      '<textarea class="ans-input" id="ans-field" rows="7" placeholder="' + (q.placeholder||"") + '">' +
      (answers[currentQ]||"") + '</textarea>';
  } else {
    fieldHtml =
      '<div class="q-hint">Ваш ответ:</div>' +
      '<input type="text" class="ans-input" id="ans-field" placeholder="' + (q.placeholder||"") + '" value="' + (answers[currentQ]||"") + '" />';
  }

  document.getElementById("question-card").innerHTML =
    '<div class="q-tag">' + q.tag + '</div>' +
    '<div class="q-text">' + q.text + '</div>' +
    fieldHtml;

  document.getElementById("ans-field").addEventListener("input", function() {
    answers[currentQ] = this.value;
    refreshDots();
  });

  document.getElementById("btn-prev").disabled = (currentQ === 0);
  var isLast = (currentQ === QUESTIONS.length - 1);
  document.getElementById("btn-next").style.display   = isLast ? "none"         : "inline-block";
  document.getElementById("btn-submit").style.display = isLast ? "inline-block" : "none";
}

function refreshDots() {
  document.querySelectorAll(".dot").forEach(function(d, i) {
    d.className = "dot";
    if (i === currentQ) d.className += " current";
    else if (answers[i] && answers[i].trim()) d.className += " answered";
  });
}

function saveField() {
  var f = document.getElementById("ans-field");
  if (f) answers[currentQ] = f.value;
}

function prevQ() { saveField(); if (currentQ > 0) { currentQ--; renderQ(); } }
function nextQ() { saveField(); if (currentQ < QUESTIONS.length-1) { currentQ++; renderQ(); } }
function goToQ(i) { saveField(); currentQ = i; renderQ(); }

/* ══ Timer ══════════════════════════════════════════════════════ */
function startTimer() {
  timerInterval = setInterval(function() {
    timerSecs--;
    var m = Math.floor(timerSecs/60), s = timerSecs % 60;
    var el = document.getElementById("timer-display");
    el.textContent = m + ":" + (s<10?"0":"") + s;
    if (timerSecs <= 300) el.classList.add("urgent");
    if (timerSecs <= 0)   doSubmit("timeout");
  }, 1000);
}

/* ══ Submit ══════════════════════════════════════════════════════ */
function confirmSubmit() { saveField(); doSubmit("manual"); }

async function doSubmit(reason) {
  if (submitted) return;
  submitted = true;
  clearInterval(timerInterval);
  if (document.fullscreenElement) document.exitFullscreen().catch(function(){});
  document.getElementById("submitted-screen").classList.add("show");

  var payload = QUESTIONS.map(function(q, i) {
    return { n: i+1, question: q.text, answer: answers[i] || "" };
  });
  var ts = new Date().toLocaleString("ru-KZ", { timeZone: "Asia/Almaty" });

  try {
    await fetch(SHEETS_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        type:      "answers",
        timestamp: ts,
        login:     user.login || user.name || "unknown",
        name:      user.name  || "unknown",
        subject:   "Mathematics",
        answers:   payload,
      }),
    });
    document.getElementById("sub-note").textContent = "Ответы сохранены.";
  } catch(e) {
    document.getElementById("sub-note").textContent = "";
  }
}

/* ══ Visibility ══════════════════════════════════════════════════ */
document.addEventListener("visibilitychange", function() {
  if (submitted || document.visibilityState !== "hidden") return;
  violations++;
  document.getElementById("warn-title").textContent = "Предупреждение";
  document.getElementById("warn-body").textContent  =
    violations >= 2
      ? "Последнее предупреждение. Следующее нарушение автоматически сдаст вашу работу."
      : "Вы переключили вкладку или свернули окно. Оставайтесь на этой странице.";
  document.getElementById("warn-count").textContent =
    "Нарушение " + violations + " из 2. Третье нарушение сдаст работу автоматически.";
  document.getElementById("warn-overlay").classList.add("show");
  if (violations >= 3) setTimeout(function(){ doSubmit("violation"); }, 600);
});

function closeWarn() {
  document.getElementById("warn-overlay").classList.remove("show");
}

/* ══ Anti-cheat ══════════════════════════════════════════════════ */
document.addEventListener("contextmenu", function(e){ e.preventDefault(); });
document.addEventListener("copy",        function(e){ e.preventDefault(); });
document.addEventListener("keydown",     function(e){
  if (e.key==="F12"){ e.preventDefault(); return; }
  if (e.ctrlKey && ["u","U","s","S","p","P"].includes(e.key)) e.preventDefault();
  if (e.ctrlKey && e.shiftKey && ["i","I","j","J","c","C"].includes(e.key)) e.preventDefault();
});

/* ══ Fullscreen ══════════════════════════════════════════════════ */
(function(){
  var el = document.documentElement;
  if (el.requestFullscreen)            el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  renderQ();
  startTimer();
})();
</script>
</body>
</html>
